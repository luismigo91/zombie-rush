<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>{{{ PRODUCT_NAME }}}</title>
    <!-- Viewport móvil: sin zoom ni scroll, a pantalla completa con notch. -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <style>
      html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #000;
        /* Bloquea gestos táctiles del navegador (scroll, pull-to-refresh). */
        touch-action: none;
        overscroll-behavior: none;
      }
      #unity-container {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      /* El canvas se dimensiona por JS a un rectángulo 9:16 con letterbox. */
      #unity-canvas {
        background: #000;
        touch-action: none;
        outline: none;
      }
      #unity-loading-bar {
        position: absolute;
        left: 50%;
        top: 50%;
        transform: translate(-50%, -50%);
        width: min(60vw, 260px);
        text-align: center;
        font-family: system-ui, sans-serif;
        color: #9be07a;
      }
      #unity-loading-title {
        font-size: 20px;
        font-weight: 700;
        letter-spacing: 2px;
        margin-bottom: 14px;
        text-transform: uppercase;
      }
      #unity-progress-bar-empty {
        width: 100%;
        height: 10px;
        border: 1px solid #3c5c2e;
        border-radius: 5px;
        background: #101810;
        overflow: hidden;
      }
      #unity-progress-bar-full {
        width: 0%;
        height: 100%;
        background: #9be07a;
        transition: width .15s ease-out;
      }
      #unity-warning {
        position: absolute;
        left: 50%;
        top: 5%;
        transform: translateX(-50%);
        max-width: 90vw;
        font-family: system-ui, sans-serif;
        font-size: 14px;
      }
      #unity-warning > div {
        padding: 8px 12px;
        margin: 4px 0;
        border-radius: 6px;
      }
    </style>
  </head>
  <body>
    <div id="unity-container">
      <canvas id="unity-canvas" tabindex="-1"></canvas>
      <div id="unity-loading-bar">
        <div id="unity-loading-title">Zombie Rush</div>
        <div id="unity-progress-bar-empty">
          <div id="unity-progress-bar-full"></div>
        </div>
      </div>
      <div id="unity-warning"></div>
    </div>
    <script>
      var container = document.querySelector("#unity-container");
      var canvas = document.querySelector("#unity-canvas");
      var loadingBar = document.querySelector("#unity-loading-bar");
      var progressBarFull = document.querySelector("#unity-progress-bar-full");
      var warningBanner = document.querySelector("#unity-warning");

      // Avisos/errores del loader de Unity (los errores se quedan fijos).
      function unityShowBanner(msg, type) {
        function updateBannerVisibility() {
          warningBanner.style.display = warningBanner.children.length ? "block" : "none";
        }
        var div = document.createElement("div");
        div.innerHTML = msg;
        warningBanner.appendChild(div);
        if (type == "error") div.style = "background: #d33; color: #fff; padding: 8px 12px;";
        else {
          if (type == "warning") div.style = "background: #dda; color: #000; padding: 8px 12px;";
          setTimeout(function() {
            warningBanner.removeChild(div);
            updateBannerVisibility();
          }, 5000);
        }
        updateBannerVisibility();
      }

      // Letterbox 9:16: el canvas ocupa el mayor rectángulo vertical que quepa.
      // El juego es portrait fijo, así que en escritorio queda centrado con
      // bandas negras a los lados y en móvil llena la pantalla.
      function resizeCanvas() {
        var vw = window.innerWidth;
        var vh = window.innerHeight;
        var aspect = 9 / 16;
        var h = vh;
        var w = Math.round(h * aspect);
        if (w > vw) {
          w = vw;
          h = Math.round(w / aspect);
        }
        canvas.style.width = w + "px";
        canvas.style.height = h + "px";
      }
      window.addEventListener("resize", resizeCanvas);
      resizeCanvas();

      var buildUrl = "Build";
      var loaderUrl = buildUrl + "/{{{ LOADER_FILENAME }}}";
      var config = {
        arguments: [],
        dataUrl: buildUrl + "/{{{ DATA_FILENAME }}}",
        frameworkUrl: buildUrl + "/{{{ FRAMEWORK_FILENAME }}}",
#if USE_THREADS
        workerUrl: buildUrl + "/{{{ WORKER_FILENAME }}}",
#endif
#if USE_WASM
        codeUrl: buildUrl + "/{{{ CODE_FILENAME }}}",
#endif
#if MEMORY_FILENAME
        memoryUrl: buildUrl + "/{{{ MEMORY_FILENAME }}}",
#endif
#if SYMBOLS_FILENAME
        symbolsUrl: buildUrl + "/{{{ SYMBOLS_FILENAME }}}",
#endif
        streamingAssetsUrl: "StreamingAssets",
        companyName: {{{ JSON.stringify(COMPANY_NAME) }}},
        productName: {{{ JSON.stringify(PRODUCT_NAME) }}},
        productVersion: {{{ JSON.stringify(PRODUCT_VERSION) }}},
        showBanner: unityShowBanner,
        // Nítido en pantallas retina pero sin pasarse de resolución en móvil.
        devicePixelRatio: Math.min(window.devicePixelRatio || 1, 2),
      };

      var script = document.createElement("script");
      script.src = loaderUrl;
      script.onload = function() {
        createUnityInstance(canvas, config, function(progress) {
          progressBarFull.style.width = 100 * progress + "%";
        }).then(function(unityInstance) {
          loadingBar.style.display = "none";
        }).catch(function(message) {
          alert(message);
        });
      };
      document.body.appendChild(script);
    </script>
  </body>
</html>
